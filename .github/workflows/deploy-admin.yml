name: Admin — Build & Deploy (Vercel)

on:
  push:
    branches: [master]
    paths:
      - 'health-hub-africa-admin/**'
      - '.github/workflows/deploy-admin.yml'
  pull_request:
    branches: [master]
    paths:
      - 'health-hub-africa-admin/**'

defaults:
  run:
    working-directory: health-hub-africa-admin

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: health-hub-africa-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.ADMIN_NEXT_PUBLIC_API_URL || 'https://api.myvaultplus.com' }}
        run: npm run build

  deploy-preview:
    name: Vercel Preview Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: ./health-hub-africa-admin

  deploy-production:
    name: Vercel Production Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./health-hub-africa-admin
