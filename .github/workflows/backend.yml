name: Backend — Build, Test & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'health-hub-africa-api/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [master]
    paths:
      - 'health-hub-africa-api/**'

defaults:
  run:
    working-directory: health-hub-africa-api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hha_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-ci
      JWT_REFRESH_SECRET: test-refresh-secret-ci
      APP_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: test-bucket
      PAYSTACK_SECRET_KEY: sk_test_ci
      FLUTTERWAVE_SECRET_KEY: FLWSECK_TEST_ci
      OPENEMR_BASE_URL: http://localhost:8080
      OPENEMR_CLIENT_ID: test-client
      OPENEMR_CLIENT_SECRET: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: health-hub-africa-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:cov


