name: Deploy HHA API

on:
  push:
    branches: [master]
    paths:
      - 'health-hub-africa-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AWS_REGION:      af-south-1
  ECR_REPOSITORY:  hha-api-repo
  ECS_CLUSTER:     hha-cluster
  ECS_SERVICE:     hha-api-service
  TASK_FAMILY:     hha-api-task
  CONTAINER_NAME:  myvaultplus

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::940482422128:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # The API runs on Fargate ARM64 (Graviton) — ~20% cheaper for the same
      # vCPU/memory. QEMU + buildx let the x86 runner produce the arm64 image.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (linux/arm64)
        id: build
        working-directory: health-hub-africa-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --push .
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition > task-definition-raw.json
          # Pin the runtime platform to ARM64 to match the image above.
          jq 'del(.enableFaultInjection)
              | .runtimePlatform = {cpuArchitecture: "ARM64", operatingSystemFamily: "LINUX"}' \
            task-definition-raw.json > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
